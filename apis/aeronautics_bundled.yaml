---
neoforge-1.21.1:
  required_when_enabled: true
  version_range: "[1.2.1,)"
  gradle: |
    repositories {
    
        maven { url = "https://maven.ryanhcode.dev/releases" }

        exclusiveContent {
            forRepository {
                maven {
                    name = "Modrinth"
                    url = "https://api.modrinth.com/maven"
                }
            }
            filter {
                includeGroup "maven.modrinth"
            }
        }
        
    }
    
    dependencies {
        // Sable runtime + API used by Create Simulated / Aeronautics
        implementation("dev.ryanhcode.sable:sable-neoforge-1.21.1:1.2.1") { transitive = false }
        compileOnly("dev.ryanhcode.sable-companion:sable-companion-common-1.21.1:1.6.0") { transitive = false }

        // Bundled runtime published from Creators-of-Aeronautics/Simulated-Project
        implementation("maven.modrinth:create-aeronautics:1.2.1+mc1.21.1")
    }
  update_files: []
name: "Create Aeronautics / Simulated 1.2.1"
